[pytest]
# Test discovery
testpaths = tests

# Output
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

# Retry flaky tests once before marking as failed
# (requires pytest-rerunfailures: pip install pytest-rerunfailures)
# addopts = --reruns 1 --reruns-delay 2

# ── Logging ────────────────────────────────────────────────────────────────────
# Live log stream to the console during the run
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Full DEBUG log written to reports/test_run.log (one file per run, overwritten)
log_file = reports/test_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Captured log section embedded in reports/report.html per test
log_level = DEBUG
log_format = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s
log_date_format = %H:%M:%S

# Markers
markers =
    flaky: known-flaky test, will be retried
    smoke: quick sanity check subset
    regression: full regression suite
